version: '3.8'

services:
  db:
    image: postgres:16
    container_name: construction_logs_db
    environment:
      POSTGRES_USER: construction
      POSTGRES_PASSWORD: construction123
      POSTGRES_DB: construction_logs
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U construction -d construction_logs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
