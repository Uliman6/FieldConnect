services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: lessons
      POSTGRES_PASSWORD: lessons
      POSTGRES_DB: lessons
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app:/app/app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lessons -d lessons"]
      interval: 3s
      timeout: 5s
      retries: 20

  node-db:
    image: postgres:16
    environment:
      POSTGRES_USER: construction
      POSTGRES_PASSWORD: construction123
      POSTGRES_DB: construction_logs
    ports:
      - "5433:5432"
    volumes:
      - node_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U construction -d construction_logs"]
      interval: 3s
      timeout: 5s
      retries: 20


  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://lessons:lessons@db:5432/lessons
      REDIS_URL: redis://redis:6379/0
      BLOB_ROOT: /app/data/blobs
      EXPORT_ROOT: /app/data/exports
      # Optional (later):
      # OPENAI_API_KEY: "set-me"
      # OPENAI_TRANSCRIBE_MODEL: "gpt-4o-mini-transcribe"
      # OPENAI_CHAT_MODEL: "gpt-4o-mini"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://lessons:lessons@db:5432/lessons
      REDIS_URL: redis://redis:6379/0
      BLOB_ROOT: /app/data/blobs
      EXPORT_ROOT: /app/data/exports
      # Optional (later):
      # OPENAI_API_KEY: "set-me"
      # OPENAI_TRANSCRIBE_MODEL: "gpt-4o-mini-transcribe"
      # OPENAI_CHAT_MODEL: "gpt-4o-mini"
    volumes:
      - ./data:/app/data
      - ./app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
  node_pgdata:
