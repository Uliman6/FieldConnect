name: Keep Backend Alive

on:
  schedule:
    # Run every 14 minutes to prevent Render cold starts
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://fieldconnect.onrender.com/health || true
          echo "Pinged backend to keep it warm"
