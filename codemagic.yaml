workflows:
  ios-production:
    name: iOS Production Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: Frontend

    integrations:
      app_store_connect: Magic

    environment:
      vars:
        EXPO_PUBLIC_API_URL: "https://fieldconnect.onrender.com"
        BUNDLE_ID: "com.const.fieldconnect"
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Run Expo Prebuild
        script: |
          npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Create private key for certificate
        script: |
          openssl genrsa -out $HOME/cert_key.pem 2048

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@file:$HOME/cert_key.pem

      - name: Set up keychain
        script: |
          keychain initialize

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Set up code signing
        script: |
          xcode-project use-profiles --project ios/*.xcodeproj

      - name: Debug - List iOS folder
        script: |
          ls -la ios/
          ls -la ios/*.xcworkspace || true
          ls -la ios/*.xcodeproj || true

      - name: List schemes
        script: |
          xcodebuild -workspace ios/*.xcworkspace -list
        ignore_failure: true

      - name: Build IPA
        script: |
          WORKSPACE=$(ls -d ios/*.xcworkspace | head -1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list | grep -A1 "Schemes:" | tail -1 | xargs)
          echo "Building workspace: $WORKSPACE with scheme: $SCHEME"
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --archive-flags="-allowProvisioningUpdates"

    artifacts:
      - Frontend/build/ios/ipa/*.ipa
      - ~/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
