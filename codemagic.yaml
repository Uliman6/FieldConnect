workflows:
  ios-production:
    name: iOS Production Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: Frontend

    integrations:
      app_store_connect: Magic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.const.fieldconnect
      vars:
        EXPO_PUBLIC_API_URL: "https://fieldconnect.onrender.com"
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Run Expo Prebuild
        script: |
          npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Set up keychain
        script: |
          keychain initialize

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Set up code signing
        script: |
          xcode-project use-profiles --project ios/*.xcodeproj

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/FieldConnect.xcworkspace" \
            --scheme "FieldConnect"

    artifacts:
      - build/ios/ipa/*.ipa
      - ~/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
