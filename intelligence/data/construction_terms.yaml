# FieldConnect Construction Terminology Dictionary
# This file is loaded by the normalizer to expand abbreviations,
# standardize trade names, and recognize brand names.
# Uli will expand this over time based on real project data.

# Abbreviation expansions
abbreviations:
  GWB: gypsum wall board
  MEP: mechanical electrical plumbing
  RFI: request for information
  CO: change order
  TI: tenant improvement
  GC: general contractor
  PE: project engineer
  PM: project manager
  OAC: owner architect contractor
  NIC: not in contract
  VE: value engineering
  ASI: architect supplemental instruction
  PCO: potential change order
  T&M: time and materials
  SOW: scope of work
  NTP: notice to proceed
  TCO: temporary certificate of occupancy
  BIM: building information modeling
  QA/QC: quality assurance quality control
  FF&E: furniture fixtures and equipment
  HVAC: heating ventilation and air conditioning
  CMU: concrete masonry unit
  LF: linear feet
  SF: square feet
  CY: cubic yards
  PSI: pounds per square inch
  ACT: acoustical ceiling tile
  FRP: fiberglass reinforced panel
  VCT: vinyl composition tile
  LVT: luxury vinyl tile
  WRB: weather resistant barrier
  DWV: drain waste vent
  AHU: air handling unit
  RTU: rooftop unit
  VAV: variable air volume
  FCU: fan coil unit
  MDF: main distribution frame
  IDF: intermediate distribution frame

